services:
  backend:
    build:
      context: ./backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=host.docker.internal;Port=5432;Database=mwcraft;Username=postgres;Password=admin
      ImageApi__UploadApiKey: change-this-key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./react-app
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
